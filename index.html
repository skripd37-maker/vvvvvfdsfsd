<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="icon" href="data:,">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>NONAME RADIO</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{min-height:100vh;background:#0a0f1a;font-family:'Courier New',monospace;padding:16px;display:flex;justify-content:center;align-items:center;}
        .radio{max-width:500px;width:100%;background:#0b0e14;border-radius:38px;border:2px solid #2a5a3a;padding:24px 20px 32px;}
        .noname{font-size:2rem;font-weight:800;color:#aaffcc;letter-spacing:4px;text-shadow:0 0 6px #00cc66;text-align:center;}
        .sub{font-size:0.7rem;color:#6a9c7a;text-align:center;margin:8px 0 20px;}
        .tuner{background:#03070c;border-radius:32px;padding:16px;margin:20px 0;border:1px solid #2a553a;}
        .signal-row{display:flex;justify-content:space-between;font-size:0.7rem;color:#5c9870;margin-bottom:8px;}
        .signal-bar{background:#1a2a22;height:8px;border-radius:8px;overflow:hidden;margin-bottom:16px;}
        .signal-fill{width:0%;height:100%;background:#00ee77;box-shadow:0 0 6px #00ee77;transition:width 0.2s;}
        .frequency{font-size:1.4rem;text-align:center;font-family:monospace;color:#b0ffc0;margin-top:8px;}
        .btn-power{width:100%;background:#1b2a1f;border:2px solid #39ff8e;color:#bfffcb;font-size:1.5rem;font-weight:bold;padding:14px;border-radius:60px;cursor:pointer;font-family:monospace;margin:16px 0;}
        .btn-power:active{transform:scale(0.97);}
        .status{text-align:center;font-size:0.75rem;background:#00000055;padding:8px;border-radius:60px;}
        .countdown{background:#030703;padding:12px;text-align:center;border-radius:32px;font-size:0.85rem;margin:16px 0;}
        .footer{font-size:0.6rem;text-align:center;margin-top:20px;color:#3f7457;}
        a{color:#5dcf8b;}
        .progress-bar{background:#1a2a22;height:4px;border-radius:4px;margin:12px 0;cursor:pointer;}
        .progress-fill{width:0%;height:100%;background:#39ff8e;border-radius:4px;}
        .time-info{display:flex;justify-content:space-between;font-size:0.6rem;color:#5c9870;margin-top:4px;}
    </style>
</head>
<body>
<div class="radio">
    <div class="noname">❖ NONAME RADIO ❖</div>
    <div class="sub">*.noname = безымянный сигнал | thurinay</div>

    <div class="countdown" id="countdownBlock">
        🔽 ДО СТАРТА ЭФИРА 🔽<br>
        <span id="timer" style="font-size:1.6rem;font-weight:bold;color:#39ff8e;">--:--:--</span>
    </div>

    <div class="tuner">
        <div class="signal-row"><span>◀ SIGNAL ▶</span><span id="signalPercent">0%</span></div>
        <div class="signal-bar"><div class="signal-fill" id="signalFill"></div></div>
        <div class="frequency" id="freqText">📡 98.4 FM</div>
    </div>

    <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="time-info"><span id="currentTime">0:00</span><span id="totalTime">0:00</span></div>

    <button class="btn-power" id="playBtn">🔘 ВКЛЮЧИТЬ ЭФИР</button>
    <div class="status" id="statusMsg">⚡ приёмник ожидает сигнала</div>

    <div class="footer"><a href="https://band.link/nonameradio" target="_blank">🎛️ presave band.link/nonameradio</a><br>повторы приветствуются • архив позже</div>
</div>
<audio id="streamAudio" preload="auto"></audio>

<script>
    // ==============================================
    // ВАША ССЫЛКА НА MP3 (уже вставлена)
    // ==============================================
    const AUDIO_URL = "https://github.com/skripd37-maker/vvvvvfdsfsd/raw/refs/heads/main/%D0%BD%D0%BE%D1%83%D0%BD%D0%B5%D0%B9%D0%BC%20%D1%80%D0%B0%D0%B4%D0%B8%D0%BE%20%D1%84%D1%83%D0%BB%D0%BB%20%D1%81%D1%8D%D1%82%20+%20%D0%B0%D0%BB%D1%8C%20(online-audio-converter.com).mp3";
    
    const audio = document.getElementById('streamAudio');
    const playBtn = document.getElementById('playBtn');
    const statusMsg = document.getElementById('statusMsg');
    const signalFill = document.getElementById('signalFill');
    const signalPercentSpan = document.getElementById('signalPercent');
    const freqText = document.getElementById('freqText');
    const progressFill = document.getElementById('progressFill');
    const currentTimeSpan = document.getElementById('currentTime');
    const totalTimeSpan = document.getElementById('totalTime');
    const progressBar = document.getElementById('progressBar');
    
    let isPlaying = false;
    let saveInterval = null;
    
    function formatTime(seconds) {
        if (isNaN(seconds)) return "0:00";
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return mins + ":" + (secs < 10 ? "0" + secs : secs);
    }
    
    function updateProgress() {
        if (audio.duration) {
            progressFill.style.width = (audio.currentTime / audio.duration * 100) + '%';
            currentTimeSpan.innerText = formatTime(audio.currentTime);
            totalTimeSpan.innerText = formatTime(audio.duration);
        }
    }
    
    function updateSignal() {
        if (isPlaying && audio.src) {
            let strong = 75 + Math.sin(Date.now() / 700) * 15;
            strong = Math.min(96, Math.max(70, strong));
            signalFill.style.width = strong + '%';
            signalPercentSpan.innerText = Math.floor(strong) + '%';
            freqText.innerHTML = "⚡ 104.2 NONAME FM ⚡";
        } else {
            let low = 10 + Math.sin(Date.now() / 1000) * 8;
            low = Math.min(30, Math.max(6, low));
            signalFill.style.width = low + '%';
            signalPercentSpan.innerText = Math.floor(low) + '%';
            freqText.innerHTML = "📡 шум эфира";
        }
    }
    
    function getTargetTime() {
        return new Date('2026-04-23T23:52:00+03:00');
    }
    
    function updateCountdown() {
        const now = new Date();
        const target = getTargetTime();
        const diff = target - now;
        const timerSpan = document.getElementById('timer');
        
        if (diff <= 0) {
            timerSpan.innerHTML = "🔴 В ЭФИРЕ 🔴";
            document.getElementById('countdownBlock').style.background = "#102211";
            return;
        }
        const hours = Math.floor(diff / (1000 * 60 * 60));
        const mins = Math.floor((diff % 3600000) / 60000);
        const secs = Math.floor((diff % 60000) / 1000);
        timerSpan.innerHTML = `${hours}ч ${mins}м ${secs}с`;
    }
    
    playBtn.onclick = () => {
        const now = new Date();
        const targetStart = getTargetTime();
        
        if (now < targetStart) {
            statusMsg.innerHTML = `⏳ Эфир начнётся 23.04 в 23:50`;
            if (window.Telegram?.WebApp) window.Telegram.WebApp.HapticFeedback?.notificationOccurred('warning');
            return;
        }
        
        if (isPlaying) {
            if (saveInterval) clearInterval(saveInterval);
            audio.pause();
            isPlaying = false;
            playBtn.innerText = "🔘 ВКЛЮЧИТЬ ЭФИР";
            statusMsg.innerHTML = "📻 приёмник выключен";
            return;
        }
        
        statusMsg.innerHTML = "📡 Подключение к сигналу...";
        audio.src = AUDIO_URL;
        audio.load();
        audio.play().then(() => {
            isPlaying = true;
            playBtn.innerText = "⏹️ ВЫКЛЮЧИТЬ";
            statusMsg.innerHTML = "🎧 NONAME RADIO в эфире!";
            saveInterval = setInterval(() => {
                localStorage.setItem('noname_pos', audio.currentTime);
            }, 3000);
            if (window.Telegram?.WebApp) window.Telegram.WebApp.HapticFeedback?.impactOccurred('medium');
        }).catch(e => {
            statusMsg.innerHTML = "🔇 Ошибка: " + e.message;
        });
    };
    
    progressBar.onclick = (e) => {
        if (!audio.duration) return;
        let rect = progressBar.getBoundingClientRect();
        let percent = (e.clientX - rect.left) / rect.width;
        audio.currentTime = percent * audio.duration;
        updateProgress();
    };
    
    audio.ontimeupdate = () => { if (isPlaying) updateProgress(); };
    setInterval(updateSignal, 250);
    setInterval(updateCountdown, 1000);
    updateCountdown();
    updateSignal();
    
    let savedPos = localStorage.getItem('noname_pos');
    if (savedPos) audio.currentTime = savedPos;
    
    // Telegram WebApp поддержка
    if (window.Telegram?.WebApp) {
        window.Telegram.WebApp.expand();
        window.Telegram.WebApp.ready();
    }
</script>
</body>
</html>
